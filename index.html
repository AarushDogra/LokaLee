<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokalee — Travel Global. Live Local.</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo"> Lokalee</div>
    <ul class="nav-links">
      <li><a href="#home">Home</a></li>
      <li><a href="#attractions">Attractions</a></li>
    </ul>
    <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
  </nav>

  <!-- HOME SECTION -->
  <section id="home" class="section">

    <!-- HERO -->
    <div class="hero">
      <h1>Travel Global. <span>Live Local.</span></h1>
      <p>Search any city and experience it like a local.</p>
      <div class="search-bar">
        <input
          type="text"
          id="citySearch"
          placeholder="Search a city... e.g. Tokyo, Paris, Mumbai"
        />
        <button id="searchBtn"> Explore</button>
      </div>
    </div>

    <!-- LOADING MESSAGE -->
    <div id="loadingMsg" class="loading-msg hidden">
      ⏳ Fetching city data...
    </div>

    <!-- WEATHER CARD -->
    <div id="weatherCard" class="card hidden">
      <div id="weatherContent"></div>
    </div>

    <!-- COUNTRY CARD -->
    <div id="countryCard" class="card hidden">
      <div id="countryContent"></div>
    </div>

  </section>

  <!-- ATTRACTIONS SECTION -->
  <section id="attractions" class="section">
    <div id="attractionsContainer" class="hidden">
      <div class="section-title">Nearby Attractions</div>

      <!-- SEARCH + SORT BAR -->
      <div class="filter-bar">
        <input
          type="text"
          id="attractionSearch"
          placeholder="Search attractions..."
        />
        <select id="attractionSort">
          <option value="">Sort By</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
        </select>
      </div>

      <!-- ATTRACTIONS GRID -->
      <div id="attractionsGrid" class="grid"></div>

      <!-- PAGINATION -->
      <div id="attractionsPagination" class="pagination"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p> Lokalee — Travel Global. Live Local</p>
  </footer>

  <script src="api.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>

</body>
</html>
